services:
  complaints-backend:
    build: .
    container_name: ${APP_CONTAINER_NAME:-complaints-backend}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-3017}:${PORT:-3017}"
    networks:
      - proxy
      - n8n_default

networks:
  proxy:
    external: true
  n8n_default:
    external: true

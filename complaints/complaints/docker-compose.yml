version: "3.8"

services:
  complaints-backend:
    build: .
    container_name: complaints-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3017:3017"
    networks:
      - proxy
      - n8n_default

networks:
  proxy:
    external: true
  n8n_default:
    external: true
